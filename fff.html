<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Isai Portfolio Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
/* ===== BASE ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  overflow-x:hidden;
  transition:.4s;
  cursor:none;
}

/* THEMES */
body.dark{
  background:#050816;
  color:white;
}

body.light{
  background:#f5f7ff;
  color:#111;
}

/* CURSOR CYBER */
.cursor{
  position:fixed;
  width:20px;
  height:20px;
  border:2px solid #38bdf8;
  border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  transition:0.05s;
  mix-blend-mode:difference;
  z-index:9999;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  backdrop-filter: blur(10px);
  background:rgba(0,0,0,0.3);
  z-index:1000;
}

nav a{
  margin:0 15px;
  text-decoration:none;
  color:inherit;
  transition:.3s;
}

nav a:hover{
  color:#38bdf8;
}

/* HERO APPLE STYLE */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero h1{
  font-size:60px;
  animation:fadeUp 1s ease;
}

.hero p{
  opacity:.7;
  margin-top:10px;
  animation:fadeUp 1.5s ease;
}

/* BUTTONS */
.btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  background:#38bdf8;
  color:black;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* SECTIONS */
section{
  padding:120px 60px;
  text-align:center;
}

/* GLASS CARDS */
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  backdrop-filter: blur(10px);
  transition:.3s;
}

.card:hover{
  transform:translateY(-10px);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:40px;
}

/* CANVAS */
#bg{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}


/* ===== SWITCH THEME ===== */
.switch {
  position: relative;
  display: inline-block;
  width: 55px;
  height: 28px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #111827;
  transition: 0.4s;
  border-radius: 34px;
  border: 1px solid rgba(255,255,255,0.2);
}

.slider:before {
  position: absolute;
  content: "";
  height: 20px;
  width: 20px;
  left: 4px;
  bottom: 3px;
  background-color: white;
  transition: 0.4s;
  border-radius: 50%;
}

/* ON STATE */
input:checked + .slider {
  background-color: #38bdf8;
}

input:checked + .slider:before {
  transform: translateX(26px);
}
</style>
</head>

<body class="dark">

<div class="cursor"></div>

<canvas id="bg"></canvas>

<!-- NAV -->
<nav>
  <div><b>ISAI.DEV</b></div>
  <div>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
  </div>

  <<label class="switch">
  <input type="checkbox" onchange="toggleTheme()" />
  <span class="slider"></span>
</label>
</nav>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>Construyo sistemas <br><span style="color:#38bdf8">modernos</span></h1>
    <p>Backend • APIs • Arquitectura escalable</p>
    <button class="btn">Ver proyectos</button>
  </div>
</div>

<!-- ABOUT -->
<section id="about">
  <h2>Sobre mí</h2>
  <p>Desarrollador full stack enfocado en sistemas escalables y diseño moderno.</p>
</section>

<!-- SKILLS -->
<section id="skills">
  <h2>Skills</h2>

  <div class="grid">
    <div class="card">Java</div>
    <div class="card">Spring Boot</div>
    <div class="card">Vue</div>
    <div class="card">React</div>
    <div class="card">Docker</div>
    <div class="card">MySQL</div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>

  <div class="grid">
    <div class="card">TimShop</div>
    <div class="card">AR Robot</div>
    <div class="card">ERP Clínico</div>
  </div>
</section>

<script>
/* ===== CURSOR ===== */
const cursor = document.querySelector(".cursor");

window.addEventListener("mousemove",(e)=>{
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* ===== THEME ===== */
function toggleTheme(){
  document.body.classList.toggle("light");
  document.body.classList.toggle("dark");
}

/* ===== THREE.JS BACKGROUND ===== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.querySelector("#bg"),
  alpha:true
});

renderer.setSize(window.innerWidth, window.innerHeight);
camera.position.z = 5;

// OBJECT
const geometry = new THREE.TorusGeometry(1,0.4,16,100);
const material = new THREE.MeshStandardMaterial({ color:0x38bdf8, wireframe:true });
const torus = new THREE.Mesh(geometry, material);
scene.add(torus);

// LIGHT
const light = new THREE.PointLight(0xffffff);
light.position.set(5,5,5);
scene.add(light);

// ANIMATE
function animate(){
  requestAnimationFrame(animate);
  torus.rotation.x += 0.01;
  torus.rotation.y += 0.005;
  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
